[options]
; ── Database ──────────────────────────────────────────────────────────
db_host = db
db_port = 5432
db_user = odoo
db_password = odoo
db_name = odoo

; ── Server ────────────────────────────────────────────────────────────
http_port = 8069
; Bind to all interfaces inside container
http_interface = 0.0.0.0

; ── Admin Password (CHANGE THIS IN PRODUCTION) ────────────────────────
admin_passwd = admin

; ── Logging ───────────────────────────────────────────────────────────
log_level = info
logfile = /var/log/odoo/odoo.log

; ── Data Directory ────────────────────────────────────────────────────
data_dir = /var/lib/odoo

; ── Workers (0 = prefork mode, good for dev/single-user) ─────────────
workers = 0

; ── Max Cron Threads ─────────────────────────────────────────────────
max_cron_threads = 1

; ── Language ──────────────────────────────────────────────────────────
; Default language for new databases
; lang = en_US

; ── Demo Data ─────────────────────────────────────────────────────────
; Set to False for production, True for testing
without_demo = False

; ── Extra Addons Path ─────────────────────────────────────────────────
; addons_path = /usr/lib/python3/dist-packages/odoo/addons,/mnt/extra-addons
